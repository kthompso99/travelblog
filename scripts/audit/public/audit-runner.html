<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23FF1493'/%3E%3Ctext x='32' y='48' font-size='48' font-weight='bold' font-family='Arial,sans-serif' text-anchor='middle' fill='white'%3EA%3C/text%3E%3C/svg%3E">

  <!-- External Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Dashboard Styles -->
  <link rel="stylesheet" href="css/audit-runner.css">
</head>
<body>
  <div class="container">
    <!-- Top Pane: Control Panel -->
    <div class="control-panel">
      <div class="header">
        <div class="trip-selector" id="tripName">🌍 Loading...</div>
        <select class="file-selector" id="fileSelector">
          <option value="">Select file...</option>
        </select>
        <button class="btn btn-primary" id="commitBtn" onclick="openCommitModal(false)" disabled style="padding: 4px 12px; font-size: 13px; border: none; border-radius: 4px;">
          Commit
        </button>
        <button class="btn btn-secondary" id="pushBtn" onclick="openCommitModal(true)" disabled style="padding: 4px 12px; font-size: 13px; border: none; border-radius: 4px;">
          Push
        </button>
        <button class="global-toggle" id="globalToggle" onclick="toggleAllDeltas()" style="margin-left: auto;">
          <span id="global-icon">▼</span> Hide details
        </button>
      </div>

      <div class="providers" id="providers">
        <!-- Provider cards will be injected here -->
      </div>
    </div>

    <!-- Bottom Pane: Preview -->
    <div class="preview-pane">
      <div class="preview-content" id="previewContent" contenteditable="true">
        <div class="empty-preview">
          Click "Output →" on any audit to view results
        </div>
      </div>
    </div>
  </div>

  <!-- Rankings Modal -->
  <div id="rankingsModal" class="modal" onclick="closeRankingsIfOutside(event)">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="rankingsTitle"></h2>
        <button class="modal-close" onclick="closeRankings()">×</button>
      </div>
      <div class="modal-body">
        <div id="rankingsList"></div>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div id="historyModal" class="modal" onclick="closeHistoryIfOutside(event)">
    <div class="modal-content" style="max-width: 900px;">
      <div class="modal-header">
        <h2 id="historyTitle"></h2>
        <button class="modal-close" onclick="closeHistory()">×</button>
      </div>
      <div class="modal-body" style="padding: 20px;">
        <canvas id="historyChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Commit Modal -->
  <div id="commitModal" class="modal" onclick="closeCommitIfOutside(event)">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h2 id="commitModalTitle">Commit Changes</h2>
        <button class="modal-close" onclick="closeCommitModal()">×</button>
      </div>
      <div class="modal-body" style="padding: 20px;">
        <div style="margin-bottom: 16px;">
          <strong>File:</strong> <span id="commitFilePath"></span>
        </div>
        <div style="margin-bottom: 16px;">
          <strong>Lines changed:</strong> <span id="commitLinesChanged"></span>
        </div>
        <div style="margin-bottom: 16px;">
          <label for="commitMessage" style="display: block; margin-bottom: 8px; font-weight: 600;">
            Commit message:
          </label>
          <input
            type="text"
            id="commitMessage"
            style="width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px;"
            placeholder="Enter commit message..."
          />
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
          <button class="btn btn-secondary" onclick="closeCommitModal()" style="padding: 8px 16px; font-size: 14px; background: #999; color: white; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
          <button class="btn btn-primary" id="confirmCommitBtn" onclick="confirmCommit()" style="padding: 8px 16px; font-size: 14px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Commit
          </button>
        </div>
        <div id="commitError" style="display: none; margin-top: 16px; padding: 12px; background: #ffebee; border-left: 4px solid #d32f2f; color: #c62828; font-size: 13px;"></div>
      </div>
    </div>
  </div>

  <!-- Dashboard Application -->
  <script type="module" src="js/audit-runner.js"></script>
</body>
</html>
